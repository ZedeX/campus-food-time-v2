<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理端登录 - 校园食光</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="center-page">
    <div class="auth-card">
      <a href="/" class="auth-back">← 返回首页</a>
      <h1 class="auth-card-title">管理端登录</h1>
      <p class="auth-card-subtitle">仅限管理员访问</p>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">用户名 <span class="required">*</span></label>
          <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码 <span class="required">*</span></label>
          <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
          <span id="btn-text">登录</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/assets/js/utils/storage.js"></script>
  <script src="/assets/js/components/notification.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    (function () {
      // 已登录则跳转
      if (Storage.getToken() && Storage.getRole() === 'admin') {
        api.get('/auth/check').then(function () {
          window.location.replace('/admin/dashboard.html');
        }).catch(function () {
          Storage.clearAuth();
        });
      }

      var form = document.getElementById('login-form');
      var submitBtn = document.getElementById('submit-btn');
      var btnText = document.getElementById('btn-text');

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;

        if (!username) {
          showNotification('请输入用户名', 'warning');
          return;
        }
        if (!password) {
          showNotification('请输入密码', 'warning');
          return;
        }

        submitBtn.disabled = true;
        btnText.textContent = '登录中...';

        api.post('/auth/admin/login', {
          username: username,
          password: password
        }).then(function (res) {
          var data = res.data || {};
          Storage.saveAuth({
            token: data.token,
            user: data.user,
            role: 'admin'
          });
          showNotification('登录成功，正在跳转...', 'success');
          setTimeout(function () {
            window.location.href = '/admin/dashboard.html';
          }, 500);
        }).catch(function () {
          submitBtn.disabled = false;
          btnText.textContent = '登录';
        });
      });
    })();
  </script>
</body>
</html>
