<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理端 - 校园食光</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-brand">
        <div class="header-brand-icon">🍽️</div>
        <span>校园食光 · 管理端</span>
      </div>
      <div class="header-actions">
        <span class="header-user" id="user-name">管理员</span>
        <button class="btn btn-ghost btn-sm" id="logout-btn">退出</button>
      </div>
    </header>

    <div class="admin-layout">
      <!-- 左侧菜单 -->
      <aside class="admin-sidebar">
        <div class="admin-menu-item active" data-menu="daily-recipes">📋 管理日食谱</div>
        <div class="admin-menu-item" data-menu="weekly-recipes">📅 管理周食谱</div>
        <div class="admin-menu-item" data-menu="teachers">👨‍🏫 管理老师账号</div>
        <div class="admin-menu-item" data-menu="parents">👨‍👩‍👧 管理家长账号</div>
        <div class="admin-menu-item" data-menu="classes">🏫 管理班级信息</div>
        <div class="admin-menu-item" data-menu="students">🎓 管理学生信息</div>
        <div class="admin-menu-item" data-menu="semesters">📆 管理学期信息</div>
        <div class="admin-menu-item" data-menu="statistics">📊 数据统计</div>
        <div class="admin-menu-item" data-menu="archives">📦 数据归档</div>
        <div class="admin-menu-item" data-menu="logs">📝 操作日志</div>
      </aside>

      <!-- 右侧内容 -->
      <main class="admin-main">
        <div id="admin-content"></div>
      </main>
    </div>
  </div>

  <!-- 通用模态框 -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">标题</span>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="/assets/js/utils/storage.js"></script>
  <script src="/assets/js/components/notification.js"></script>
  <script src="/assets/js/api.js"></script>
  <script>
    (function () {
      'use strict';

      // 登录检测
      if (!Storage.getToken() || Storage.getRole() !== 'admin') {
        window.location.replace('/admin/login.html');
        return;
      }

      // 退出
      document.getElementById('logout-btn').addEventListener('click', function () {
        if (!confirm('确定要退出登录吗？')) return;
        api.post('/auth/logout', {}).catch(function () {}).then(function () {
          Storage.clearAuth();
          showNotification('已安全退出', 'success');
          setTimeout(function () { window.location.href = '/'; }, 500);
        });
      });

      // ---------- 菜单配置 ----------
      var MENUS = {
        'daily-recipes': {
          title: '管理日食谱',
          api: '/admin/api/recipes/daily',
          searchPlaceholder: '按日期搜索 (YYYY-MM-DD)',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'date', label: '日期' },
            { key: 'schoolId', label: '学校ID' },
            { key: 'notes', label: '备注', ellipsis: true },
            { key: 'version', label: '版本' },
            { key: 'updatedAt', label: '更新时间', render: formatTime }
          ],
          actions: ['view', 'delete'],
          canCreate: false
        },
        'weekly-recipes': {
          title: '管理周食谱',
          api: '/admin/api/recipes/weekly',
          searchPlaceholder: '按周搜索 (YYYY-Www)',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'yearWeek', label: '年周' },
            { key: 'startDate', label: '开始日期' },
            { key: 'endDate', label: '结束日期' },
            { key: 'notes', label: '备注', ellipsis: true },
            { key: 'version', label: '版本' },
            { key: 'updatedAt', label: '更新时间', render: formatTime }
          ],
          actions: ['view', 'delete'],
          canCreate: false
        },
        'teachers': {
          title: '管理老师账号',
          api: '/admin/api/teachers',
          searchPlaceholder: '按姓名或手机号搜索',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'name', label: '姓名' },
            { key: 'phone', label: '手机号' },
            { key: 'schoolId', label: '学校ID' },
            { key: 'status', label: '状态', render: renderStatus },
            { key: 'createdAt', label: '创建时间', render: formatTime }
          ],
          actions: ['edit', 'delete'],
          canCreate: true,
          form: [
            { key: 'phone', label: '手机号', type: 'tel', required: true },
            { key: 'password', label: '密码', type: 'text', required: true },
            { key: 'name', label: '姓名', type: 'text', required: true },
            { key: 'schoolId', label: '学校ID', type: 'number', required: true, default: 1 }
          ]
        },
        'parents': {
          title: '管理家长账号',
          api: '/admin/api/parents',
          searchPlaceholder: '按手机号搜索',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'phone', label: '手机号' },
            { key: 'studentName', label: '学生姓名' },
            { key: 'className', label: '班级' },
            { key: 'status', label: '状态', render: renderStatus },
            { key: 'createdAt', label: '创建时间', render: formatTime }
          ],
          actions: ['edit', 'delete'],
          canCreate: false
        },
        'classes': {
          title: '管理班级信息',
          api: '/admin/api/classes',
          searchPlaceholder: '按班级名称搜索',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'name', label: '班级名称' },
            { key: 'grade', label: '年级' },
            { key: 'classNumber', label: '班级编号' },
            { key: 'schoolId', label: '学校ID' },
            { key: 'visible', label: '是否可见', render: renderBool },
            { key: 'createdAt', label: '创建时间', render: formatTime }
          ],
          actions: ['edit', 'delete'],
          canCreate: true,
          form: [
            { key: 'name', label: '班级名称', type: 'text', required: true },
            { key: 'grade', label: '年级', type: 'number', required: true },
            { key: 'classNumber', label: '班级编号', type: 'number', required: true },
            { key: 'schoolId', label: '学校ID', type: 'number', required: true, default: 1 },
            { key: 'visible', label: '是否可见', type: 'checkbox', default: true }
          ]
        },
        'students': {
          title: '管理学生信息',
          api: '/admin/api/students',
          searchPlaceholder: '按姓名搜索',
          columns: [
            { key: 'id', label: 'ID' },
            { key: 'name', label: '学生姓名' },
            { key: 'classId', label: '班级ID' },
            { key: 'schoolId', label: '学校ID' },
            { key: 'idPrefix', label: '身份证前3位' },
            { key: 'idSuffix', label: '身份证后4位' },
            { key: 'createdAt', label: '创建时间', render: formatTime }
          ],
          actions: ['edit', 'delete'],
          canCreate: true,
          form: [
            { key: 'name', label: '学生姓名', type: 'text', required: true },
            { key: 'classId', label: '班级ID', type: 'text', required: true },
            { key: 'schoolId', label: '学校ID', type: 'number', required: true, default: 1 },
            { key: 'idNumber', label: '身份证号', type: 'text', required: false }
          ]
        },
        'semesters': {
          title: '管理学期信息',
          api: '/admin/api/semesters',
          searchPlaceholder: '按学期名称搜索',
          columns: [
            { key: 'id', label: '学期ID' },
            { key: 'name', label: '学期名称' },
            { key: 'startDate', label: '开始日期' },
            { key: 'endDate', label: '结束日期' },
            { key: 'isActive', label: '当前学期', render: renderBool },
            { key: 'createdAt', label: '创建时间', render: formatTime }
          ],
          actions: ['edit'],
          canCreate: true,
          form: [
            { key: 'id', label: '学期ID (如 2024-2025-2)', type: 'text', required: true },
            { key: 'name', label: '学期名称', type: 'text', required: true },
            { key: 'startDate', label: '开始日期 (YYYY-MM-DD)', type: 'text', required: true },
            { key: 'endDate', label: '结束日期 (YYYY-MM-DD)', type: 'text', required: true },
            { key: 'isActive', label: '设为当前学期', type: 'checkbox', default: false }
          ]
        },
        'statistics': {
          title: '数据统计',
          custom: renderStatistics
        },
        'archives': {
          title: '数据归档',
          custom: renderArchives
        },
        'logs': {
          title: '操作日志',
          api: '/admin/api/logs',
          searchPlaceholder: '按操作人或类型搜索',
          columns: [
            { key: 'id', label: '日志ID' },
            { key: 'userName', label: '操作人' },
            { key: 'userType', label: '用户类型' },
            { key: 'action', label: '操作类型' },
            { key: 'target', label: '操作对象' },
            { key: 'result', label: '结果', render: renderStatus },
            { key: 'createdAt', label: '操作时间', render: formatTime }
          ],
          actions: [],
          canCreate: false
        }
      };

      // ---------- 工具函数 ----------
      function formatTime(str) {
        if (!str) return '-';
        try {
          var d = new Date(str);
          if (isNaN(d.getTime())) return str;
          var y = d.getFullYear();
          var m = String(d.getMonth() + 1).padStart(2, '0');
          var day = String(d.getDate()).padStart(2, '0');
          var h = String(d.getHours()).padStart(2, '0');
          var min = String(d.getMinutes()).padStart(2, '0');
          return y + '-' + m + '-' + day + ' ' + h + ':' + min;
        } catch (e) {
          return str;
        }
      }

      function renderStatus(val) {
        if (val === 'active' || val === 'success') {
          return '<span class="badge badge-success">' + val + '</span>';
        }
        if (val === 'disabled' || val === 'failed' || val === 'error') {
          return '<span class="badge badge-warning">' + val + '</span>';
        }
        return '<span class="badge badge-default">' + (val || '-') + '</span>';
      }

      function renderBool(val) {
        return val ? '<span class="badge badge-success">是</span>' : '<span class="badge badge-default">否</span>';
      }

      function escapeHtml(str) {
        if (str == null) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      // ---------- 模态框 ----------
      var modal = document.getElementById('modal');
      var modalTitle = document.getElementById('modal-title');
      var modalBody = document.getElementById('modal-body');
      var modalFooter = document.getElementById('modal-footer');

      function openModal(title, bodyHtml, footerHtml) {
        modalTitle.textContent = title;
        modalBody.innerHTML = bodyHtml;
        modalFooter.innerHTML = footerHtml || '';
        modal.classList.remove('hidden');
      }

      function closeModal() {
        modal.classList.add('hidden');
        modalBody.innerHTML = '';
        modalFooter.innerHTML = '';
      }

      document.getElementById('modal-close').addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });

      // ---------- 表格渲染 ----------
      var currentMenu = 'daily-recipes';
      var currentPage = 1;
      var pageSize = 20;
      var searchKeyword = '';

      function switchMenu(menu) {
        currentMenu = menu;
        currentPage = 1;
        searchKeyword = '';
        document.querySelectorAll('.admin-menu-item').forEach(function (item) {
          item.classList.toggle('active', item.dataset.menu === menu);
        });
        window.location.hash = 'menu=' + menu;
        renderContent();
      }

      document.querySelectorAll('.admin-menu-item').forEach(function (item) {
        item.addEventListener('click', function () {
          switchMenu(item.dataset.menu);
        });
      });

      function renderContent() {
        var config = MENUS[currentMenu];
        var content = document.getElementById('admin-content');

        if (config.custom) {
          config.custom(content);
          return;
        }

        // 工具栏
        var toolbar = '<div class="admin-toolbar">' +
          '<h2 style="margin:0;">' + config.title + '</h2>' +
          '<div class="admin-search">' +
          '<input type="text" class="form-input" id="search-input" placeholder="' + (config.searchPlaceholder || '搜索') + '" value="' + escapeHtml(searchKeyword) + '">' +
          '<button class="btn btn-primary btn-sm" id="search-btn">搜索</button>' +
          '</div>' +
          (config.canCreate ? '<button class="btn btn-primary" id="create-btn">+ 新建</button>' : '') +
          '</div>';

        content.innerHTML = toolbar +
          '<div id="table-area"><div class="loading-page"><div class="loading"></div><span>正在加载...</span></div></div>' +
          '<div id="pagination-area"></div>';

        // 绑定事件
        var searchInput = document.getElementById('search-input');
        document.getElementById('search-btn').addEventListener('click', function () {
          searchKeyword = searchInput.value.trim();
          currentPage = 1;
          loadTable();
        });
        searchInput.addEventListener('keypress', function (e) {
          if (e.key === 'Enter') {
            searchKeyword = searchInput.value.trim();
            currentPage = 1;
            loadTable();
          }
        });

        if (config.canCreate) {
          document.getElementById('create-btn').addEventListener('click', function () {
            openCreateModal(config);
          });
        }

        loadTable();
      }

      function loadTable() {
        var config = MENUS[currentMenu];
        var params = 'page=' + currentPage + '&pageSize=' + pageSize;
        if (searchKeyword) params += '&keyword=' + encodeURIComponent(searchKeyword);

        api.get(config.api + '?' + params).then(function (res) {
          var data = res.data || {};
          var list = Array.isArray(data) ? data : (data.data || data.list || []);
          var total = data.total || list.length;

          renderTable(config, list, total);
        }).catch(function () {
          document.getElementById('table-area').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">加载失败，请稍后重试</div></div>';
        });
      }

      function renderTable(config, list, total) {
        var tableArea = document.getElementById('table-area');

        if (!list || list.length === 0) {
          tableArea.innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">暂无数据</div></div>';
          document.getElementById('pagination-area').innerHTML = '';
          return;
        }

        var html = '<div class="table-wrapper"><table class="table"><thead><tr>';
        config.columns.forEach(function (col) {
          html += '<th>' + col.label + '</th>';
        });
        if (config.actions && config.actions.length) {
          html += '<th>操作</th>';
        }
        html += '</tr></thead><tbody>';

        list.forEach(function (row) {
          html += '<tr>';
          config.columns.forEach(function (col) {
            var val = row[col.key];
            if (col.render) {
              val = col.render(val, row);
            } else {
              val = escapeHtml(val);
              if (col.ellipsis && val && val.length > 30) {
                val = '<span title="' + escapeHtml(row[col.key]) + '">' + val.substring(0, 30) + '...</span>';
              }
            }
            html += '<td>' + (val === '' || val === null || val === undefined ? '-' : val) + '</td>';
          });

          if (config.actions && config.actions.length) {
            html += '<td><div class="table-actions">';
            config.actions.forEach(function (action) {
              if (action === 'view') {
                html += '<button class="btn btn-secondary btn-sm" data-action="view" data-id="' + escapeHtml(row.id) + '">查看</button>';
              } else if (action === 'edit') {
                html += '<button class="btn btn-secondary btn-sm" data-action="edit" data-id="' + escapeHtml(row.id) + '">编辑</button>';
              } else if (action === 'delete') {
                html += '<button class="btn btn-danger btn-sm" data-action="delete" data-id="' + escapeHtml(row.id) + '">删除</button>';
              }
            });
            html += '</div></td>';
          }
          html += '</tr>';
        });

        html += '</tbody></table></div>';
        tableArea.innerHTML = html;

        // 绑定操作按钮
        tableArea.querySelectorAll('[data-action]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var action = btn.dataset.action;
            var id = btn.dataset.id;
            handleAction(config, action, id, list);
          });
        });

        // 分页
        renderPagination(total);
      }

      function renderPagination(total) {
        var totalPages = Math.ceil(total / pageSize) || 1;
        if (totalPages <= 1) {
          document.getElementById('pagination-area').innerHTML =
            '<div class="pagination"><span class="pagination-info">共 ' + total + ' 条</span></div>';
          return;
        }

        var html = '<div class="pagination">';
        html += '<button class="pagination-btn" data-page="' + (currentPage - 1) + '" ' + (currentPage <= 1 ? 'disabled' : '') + '>‹</button>';

        var start = Math.max(1, currentPage - 2);
        var end = Math.min(totalPages, currentPage + 2);
        for (var i = start; i <= end; i++) {
          html += '<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '" data-page="' + i + '">' + i + '</button>';
        }

        html += '<button class="pagination-btn" data-page="' + (currentPage + 1) + '" ' + (currentPage >= totalPages ? 'disabled' : '') + '>›</button>';
        html += '<span class="pagination-info">共 ' + total + ' 条 / ' + totalPages + ' 页</span>';
        html += '</div>';

        document.getElementById('pagination-area').innerHTML = html;

        document.querySelectorAll('.pagination-btn[data-page]').forEach(function (btn) {
          btn.addEventListener('click', function () {
            if (btn.disabled) return;
            currentPage = parseInt(btn.dataset.page);
            loadTable();
          });
        });
      }

      function handleAction(config, action, id, list) {
        var row = list.find(function (r) { return String(r.id) === String(id); });

        if (action === 'view') {
          var html = '<div>';
          config.columns.forEach(function (col) {
            var val = row ? row[col.key] : '';
            html += '<div class="flex justify-between mb-sm" style="border-bottom:1px solid var(--color-border); padding-bottom:8px;">' +
              '<span class="text-muted">' + col.label + '</span>' +
              '<span class="font-bold">' + escapeHtml(val) + '</span></div>';
          });
          html += '</div>';
          openModal('查看详情', html, '<button class="btn btn-secondary" id="modal-cancel">关闭</button>');
          document.getElementById('modal-cancel').addEventListener('click', closeModal);

        } else if (action === 'edit') {
          openEditModal(config, row);

        } else if (action === 'delete') {
          openModal('确认删除',
            '<p>确定要删除 <strong>' + escapeHtml(id) + '</strong> 吗？此操作不可恢复。</p>',
            '<button class="btn btn-secondary" id="modal-cancel">取消</button>' +
            '<button class="btn btn-danger" id="modal-confirm">确认删除</button>'
          );
          document.getElementById('modal-cancel').addEventListener('click', closeModal);
          document.getElementById('modal-confirm').addEventListener('click', function () {
            api.delete(config.api + '/' + encodeURIComponent(id)).then(function () {
              closeModal();
              showNotification('删除成功', 'success');
              loadTable();
            }).catch(function () {
              // 错误已由 api 处理
            });
          });
        }
      }

      function openCreateModal(config) {
        openFormModal(config, '新建' + config.title, null);
      }

      function openEditModal(config, row) {
        openFormModal(config, '编辑' + config.title, row);
      }

      function openFormModal(config, title, row) {
        var html = '';
        config.form.forEach(function (field) {
          var val = row ? row[field.key] : (field.default !== undefined ? field.default : '');
          html += '<div class="form-group">';
          html += '<label class="form-label" for="field-' + field.key + '">' + field.label;
          if (field.required) html += ' <span class="required">*</span>';
          html += '</label>';

          if (field.type === 'checkbox') {
            html += '<input type="checkbox" id="field-' + field.key + '" data-key="' + field.key + '"' + (val ? ' checked' : '') + '>';
          } else {
            html += '<input type="' + field.type + '" id="field-' + field.key + '" data-key="' + field.key + '" class="form-input" value="' + escapeHtml(val) + '"' + (field.required ? ' required' : '') + '>';
          }
          html += '</div>';
        });

        openModal(title, html,
          '<button class="btn btn-secondary" id="modal-cancel">取消</button>' +
          '<button class="btn btn-primary" id="modal-save">保存</button>'
        );

        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-save').addEventListener('click', function () {
          var body = {};
          var valid = true;
          config.form.forEach(function (field) {
            var el = document.getElementById('field-' + field.key);
            if (field.type === 'checkbox') {
              body[field.key] = el.checked;
            } else {
              body[field.key] = el.value.trim();
              if (field.required && !body[field.key]) {
                showNotification(field.label + '不能为空', 'warning');
                valid = false;
              }
            }
          });

          if (!valid) return;

          var saveBtn = document.getElementById('modal-save');
          saveBtn.disabled = true;
          saveBtn.textContent = '保存中...';

          var promise;
          if (row) {
            promise = api.put(config.api + '/' + encodeURIComponent(row.id), body);
          } else {
            promise = api.post(config.api, body);
          }

          promise.then(function () {
            closeModal();
            showNotification('保存成功', 'success');
            loadTable();
          }).catch(function () {
            saveBtn.disabled = false;
            saveBtn.textContent = '保存';
          });
        });
      }

      // ---------- 自定义页面：数据统计 ----------
      function renderStatistics(content) {
        content.innerHTML =
          '<div class="admin-toolbar"><h2 style="margin:0;">数据统计</h2></div>' +
          '<div class="card mb-lg">' +
          '<div class="card-header"><span class="card-title">菜品出现次数统计</span></div>' +
          '<div id="stats-area"><div class="loading-page"><div class="loading"></div><span>正在加载统计数据...</span></div></div>' +
          '</div>';

        api.get('/admin/api/statistics/recipes').then(function (res) {
          var data = res.data || [];
          if (!data.length) {
            document.getElementById('stats-area').innerHTML =
              '<div class="empty-state"><div class="empty-state-text">暂无统计数据</div></div>';
            return;
          }
          var html = '<div class="table-wrapper"><table class="table"><thead><tr><th>菜名</th><th>出现次数</th></tr></thead><tbody>';
          data.forEach(function (item) {
            html += '<tr><td>' + escapeHtml(item.dishName || item.name) + '</td><td>' + (item.count || 0) + '</td></tr>';
          });
          html += '</tbody></table></div>';
          document.getElementById('stats-area').innerHTML = html;
        }).catch(function () {
          document.getElementById('stats-area').innerHTML =
            '<div class="empty-state"><div class="empty-state-text">加载失败，请稍后重试</div></div>';
        });
      }

      // ---------- 自定义页面：数据归档 ----------
      function renderArchives(content) {
        content.innerHTML =
          '<div class="admin-toolbar"><h2 style="margin:0;">数据归档</h2>' +
          '<button class="btn btn-primary" id="create-archive">+ 创建归档</button></div>' +
          '<div id="archive-area"><div class="loading-page"><div class="loading"></div><span>正在加载归档列表...</span></div></div>';

        loadArchives();

        document.getElementById('create-archive').addEventListener('click', function () {
          openModal('创建归档',
            '<div class="form-group"><label class="form-label">学期ID <span class="required">*</span></label>' +
            '<input type="text" id="archive-semester" class="form-input" placeholder="如 2024-2025-2"></div>' +
            '<div class="form-group"><label class="form-label">学校ID <span class="required">*</span></label>' +
            '<input type="number" id="archive-school" class="form-input" value="1"></div>',
            '<button class="btn btn-secondary" id="modal-cancel">取消</button>' +
            '<button class="btn btn-primary" id="modal-confirm">创建归档</button>'
          );
          document.getElementById('modal-cancel').addEventListener('click', closeModal);
          document.getElementById('modal-confirm').addEventListener('click', function () {
            var semesterId = document.getElementById('archive-semester').value.trim();
            var schoolId = parseInt(document.getElementById('archive-school').value);
            if (!semesterId) {
              showNotification('请输入学期ID', 'warning');
              return;
            }
            api.post('/admin/api/archive/create', {
              semesterId: semesterId,
              schoolId: schoolId
            }).then(function () {
              closeModal();
              showNotification('归档任务已创建', 'success');
              loadArchives();
            }).catch(function () {});
          });
        });
      }

      function loadArchives() {
        var area = document.getElementById('archive-area');
        if (!area) return;
        api.get('/admin/api/archive/list').then(function (res) {
          var data = res.data || [];
          if (!data.length) {
            area.innerHTML = '<div class="empty-state"><div class="empty-state-text">暂无归档</div></div>';
            return;
          }
          var html = '<div class="table-wrapper"><table class="table"><thead><tr>' +
            '<th>归档ID</th><th>学期</th><th>状态</th><th>日食谱数</th><th>周食谱数</th><th>创建时间</th><th>操作</th>' +
            '</tr></thead><tbody>';
          data.forEach(function (a) {
            html += '<tr>' +
              '<td>' + escapeHtml(a.id) + '</td>' +
              '<td>' + escapeHtml(a.semesterName || a.semesterId) + '</td>' +
              '<td>' + renderStatus(a.status) + '</td>' +
              '<td>' + (a.recipeCountDaily || (a.recipeCount && a.recipeCount.daily) || 0) + '</td>' +
              '<td>' + (a.recipeCountWeekly || (a.recipeCount && a.recipeCount.weekly) || 0) + '</td>' +
              '<td>' + formatTime(a.createdAt) + '</td>' +
              '<td><div class="table-actions">' +
              (a.status === 'completed' ? '<a class="btn btn-secondary btn-sm" href="' + (a.downloadUrl || ('/admin/api/archive/' + encodeURIComponent(a.id) + '/download')) + '" target="_blank">下载</a>' : '') +
              '<button class="btn btn-danger btn-sm" data-del="' + escapeHtml(a.id) + '">删除</button>' +
              '</div></td>' +
              '</tr>';
          });
          html += '</tbody></table></div>';
          area.innerHTML = html;

          area.querySelectorAll('[data-del]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var id = btn.dataset.del;
              if (!confirm('确定要删除归档 ' + id + ' 吗？')) return;
              api.delete('/admin/api/archive/' + encodeURIComponent(id)).then(function () {
                showNotification('删除成功', 'success');
                loadArchives();
              }).catch(function () {});
            });
          });
        }).catch(function () {
          area.innerHTML = '<div class="empty-state"><div class="empty-state-text">加载失败，请稍后重试</div></div>';
        });
      }

      // ---------- 初始化 ----------
      function parseHash() {
        var hash = window.location.hash.slice(1);
        if (!hash) return;
        var params = {};
        hash.split('&').forEach(function (kv) {
          var p = kv.split('=');
          if (p.length === 2) params[p[0]] = decodeURIComponent(p[1]);
        });
        if (params.menu && MENUS[params.menu]) {
          currentMenu = params.menu;
        }
      }

      parseHash();
      switchMenu(currentMenu);

      window.addEventListener('hashchange', function () {
        parseHash();
        switchMenu(currentMenu);
      });
    })();
  </script>
</body>
</html>
